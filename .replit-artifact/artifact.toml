kind = "web"
previewPath = "/"
title = "Gym Management System"
version = "1.0.0"
id = "artifacts/gym-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23457

[services.development]
run = "pnpm --filter @workspace/gym-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-app", "run", "build" ]
publicDir = "artifacts/gym-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23457"
BASE_PATH = "/"
